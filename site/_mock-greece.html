<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>MOCK · Greece combined</title>
<style>
:root{--cream:#F6F1E7;--sir-gold:#E7C489;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0c110d;color:var(--cream);font-family:'Helvetica Neue',Arial,sans-serif;padding-bottom:60px;}
.wrap{max-width:900px;margin:0 auto;padding:40px 20px 0;text-align:center;}
.eyebrow{font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--sir-gold);margin-bottom:10px;}
h1{font-family:'Didot','Bodoni 72',Georgia,serif;font-weight:400;font-size:52px;letter-spacing:.5px;margin-bottom:8px;}
.note{font-size:12px;letter-spacing:1px;color:#9aa08f;margin-bottom:6px;}
.bundlebar{max-width:860px;margin:26px auto 0;padding:16px 24px;display:flex;flex-wrap:wrap;align-items:baseline;gap:8px 18px;border-top:1px solid rgba(231,196,137,.16);border-bottom:1px solid rgba(231,196,137,.16);text-align:left;}
.bundlebar .bb-lead{font-family:'Didot','Bodoni 72',Georgia,serif;font-size:21px;color:var(--cream);letter-spacing:.5px;}
.bundlebar .bb-deal{font-size:12.5px;letter-spacing:2px;text-transform:uppercase;color:var(--sir-gold);}
.bundlebar .bb-note{font-size:12px;letter-spacing:.5px;color:#9aa08f;margin-left:auto;}
.flow{max-width:860px;margin:26px auto 44px;padding:0 clamp(14px,3vw,28px);display:grid;grid-template-columns:repeat(4,1fr);gap:clamp(6px,1vw,11px);}
.p{position:relative;margin:0;}
.p .shot{position:relative;aspect-ratio:1;overflow:hidden;background:#12180f;box-shadow:0 10px 26px -16px rgba(0,0,0,.55);}
.p .shot img{width:100%;height:100%;display:block;object-fit:cover;filter:saturate(1.04) contrast(1.03) brightness(.92);}
.p .shot::after{content:"";position:absolute;inset:0;box-shadow:inset 0 0 0 1px rgba(231,196,137,.14);pointer-events:none;}
.p .cap{display:block;padding:7px 2px 0;font-family:'Didot','Bodoni 72',Georgia,serif;font-size:13px;line-height:1.2;color:var(--cream);letter-spacing:.2px;text-align:left;}
@media(max-width:560px){ .flow{gap:5px;padding:0 10px;} .p .cap{font-size:10.5px;padding:5px 1px 0;} .bundlebar{gap:4px 12px;padding:12px 12px;} .bundlebar .bb-note{margin-left:0;flex-basis:100%;} }
</style></head>
<body>
<div class="wrap">
  <div class="eyebrow">Corfu · Meteora · Athens</div>
  <h1>Greece</h1>
  <div class="note">MOCK — 12 postcards, combined · balanced · not live</div>
</div>

<div class="bundlebar">
  <span class="bb-lead">The postcards</span>
  <span class="bb-deal">Any 3 for $18 · Any 5 for $28 · Any 10 for $50</span>
  <span class="bb-note">mix any images · $7 each</span>
</div>

<div class="flow">
  <figure class="p"><div class="shot"><img src="img/greece-meteora-valley.jpg" alt="The Green Valley"></div><figcaption class="cap">The Green Valley</figcaption></figure>
  <figure class="p"><div class="shot"><img src="img/greece-corfu-sunset.jpg" alt="Sun on the Ionian"></div><figcaption class="cap">Sun on the Ionian</figcaption></figure>
  <figure class="p"><div class="shot"><img src="img/athens-record-wall.jpg" alt="Every Record Ever"></div><figcaption class="cap">Every Record Ever</figcaption></figure>
  <figure class="p"><div class="shot"><img src="img/athens-marble-column.jpg" alt="Leaning"></div><figcaption class="cap">Leaning</figcaption></figure>
  <figure class="p"><div class="shot"><img src="img/greece-meteora-folk-museum.jpg" alt="The Old Kitchen"></div><figcaption class="cap">The Old Kitchen</figcaption></figure>
  <figure class="p"><div class="shot"><img src="img/athens-marble-magenta.jpg" alt="Goddess in Magenta"></div><figcaption class="cap">Goddess in Magenta</figcaption></figure>
  <figure class="p"><div class="shot"><img src="img/athens-doorway.jpg" alt="The Yellow Door"></div><figcaption class="cap">The Yellow Door</figcaption></figure>
  <figure class="p"><div class="shot"><img src="img/greece-corfu-bay.jpg" alt="Swimming Weather"></div><figcaption class="cap">Swimming Weather</figcaption></figure>
  <figure class="p"><div class="shot"><img src="img/greece-corfu-waterfront.jpg" alt="The Old Town from the Water"></div><figcaption class="cap">The Old Town from the Water</figcaption></figure>
  <figure class="p"><div class="shot"><img src="img/athens-fresco.jpg" alt="Two Saints"></div><figcaption class="cap">Two Saints</figcaption></figure>
  <figure class="p"><div class="shot"><img src="img/athens-philopappos.jpg" alt="Philopappos Hill"></div><figcaption class="cap">Philopappos Hill</figcaption></figure>
  <figure class="p"><div class="shot"><img src="img/athens-caryatids.jpg" alt="The Six Maidens"></div><figcaption class="cap">The Six Maidens</figcaption></figure>
</div>
</body></html>
